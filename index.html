<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind & Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <main id="login" class=" min-h-screen max-w-md mx-auto mt-16 mb-16 bg-[#F8FAFC] shadow-2xl">
        <div class="logo w-[200px] mx-auto pt-10">
            <img src="assets/github-logo.png" class="mx-auto w-20" alt="">
            <div class="whitespace-nowrap flex flex-col items-center justify-center text-center">
                <h1 class="text-3xl font-bold text-[#1F2937]  ">GitHub Issues Tracker</h1>
                <p class="font-semibold text-[#64748B] ">Sign in to manage your issues</p>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center pt-4">
           <fieldset class="fieldset w-xs  p-4">

                 <label class="label font-bold text-[#1F2937]">Username</label>
                 <input id="input-username" type="text" class="input" placeholder="Enter username" />
                 <p class="text-primary">Default: admin</p>

                 <br>

                 <label class="label font-bold text-[#1F2937]">Password</label>
                 <input id="input-password" type="password" class="input" placeholder="Enter Password" />
                 <p class="text-primary">Default: admin123</p>

                <button id="login-btn" class="btn btn-primary mt-4">Login</button>
           </fieldset>
        </div>
            
        <div class="flex flex-col items-center justify-center text-center">
            <h4 class="text-[#1F2937] pt-5 pb-5">OR</h4>
           <p class="text-[#64748B] pb-3">Demo Credentials:</p>
              <div>
                <p>Username: <span class="text-[#1F2937]">admin</span> <br>
                   Password: <span class="text-[#1F2937]">admin123</span>
                </p>

              </div>
        </div>
    </main>
      <script src="js/login.js"></script>  
</body>
</html>
